  # ── DEPLOYMENT ────────────────────────────────────────────────────────────────

  # FIX: DependsOn was incomplete — missing logout, change-password, user PUT/DELETE,
  #      and all OPTIONS methods. An incomplete DependsOn can cause a race condition
  #      where the deployment is created before some methods are registered,
  #      resulting in 404s for those routes after stack creation.
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      # /docs
      - GetDocsMethod
      - PostDocsMethod
      - OptionsDocsMethod
      # /docs/{id}
      - PutDocMethod
      - DeleteDocMethod
      - OptionsDocIdMethod
      # /docs/{id}/download
      - GetDownloadMethod
      - OptionsDownloadMethod
      # /auth/*
      - PostLoginMethod
      - OptionsLoginMethod
      - GetMeMethod
      - OptionsMeMethod
      - PostLogoutMethod
      - OptionsLogoutMethod
      - PostChangePwMethod
      - OptionsChangePwMethod
      # /users
      - GetUsersMethod
      - PostUsersMethod
      - OptionsUsersMethod
      # /users/{id}
      - PutUserMethod
      - DeleteUserMethod
      - OptionsUserIdMethod
    Properties:
      RestApiId: !Ref RestApi
      StageName: prod

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:apigateway:${AWS::Region}::/restapis/${RestApi}/*'

# ── OUTPUTS ───────────────────────────────────────────────────────────────────

Outputs:
  FrontendBucketName:
    Description: S3 bucket name for frontend assets
    Value: !Ref FrontendBucket

  FrontendS3URL:
    Description: Direct S3 website URL (use CloudFrontURL for production)
    Value: !Sub 'http://${FrontendBucket}.s3-website-${AWS::Region}.amazonaws.com'

  CloudFrontURL:
    Description: CloudFront URL — use this as the primary app URL
    Value: !Sub 'https://${FrontendCloudFront.DomainName}'

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (needed to invalidate cache after deploys)
    Value: !Ref FrontendCloudFront

  ApiEndpoint:
    Description: API Gateway base URL
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref ApiLambda

  UsersTableName:
    Description: DynamoDB users table name
    Value: !Ref UsersTable

  DocumentsTableName:
    Description: DynamoDB documents table name
    Value: !Ref DocumentsTable
